<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>[WF] 02_login — Cambio J</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g-900:#111827; --g-800:#1F2937; --g-700:#374151;
      --g-600:#4B5563; --g-500:#6B7280; --g-400:#9CA3AF;
      --g-300:#D1D5DB; --g-200:#E5E7EB; --g-100:#F3F4F6;
      --g-50:#F9FAFB;  --white:#FFFFFF;
      --font:'Figtree', system-ui, sans-serif;
      --r-4:4px; --r-8:8px; --r-12:12px; --r-16:16px; --r-24:24px;
      --sp-4:4px; --sp-8:8px; --sp-12:12px; --sp-16:16px;
      --sp-24:24px; --sp-32:32px; --sp-48:48px;
    
      /* ── Paleta de marca Cambio J ── */
      --cj-morado:        #7C3AED;
      --cj-morado-medio:  #A78BFA;
      --cj-morado-claro:  #DDD6FE;
      --cj-turquesa:      #06B6D4;
      --cj-turquesa-claro:#67E8F9;
      --cj-rosa:          #EC4899;
      --cj-fondo:         #F8FAFC;
      --cj-texto:         #1E293B;
      --cj-texto-claro:   #64748B;

      /* Semánticos de marca */
      --brand-primary:    var(--cj-morado);
      --brand-secondary:  var(--cj-turquesa);
      --brand-accent:     var(--cj-rosa);
      --brand-surface:    var(--cj-morado-claro);
}

    html { background:var(--cj-fondo); }

    body {
      font-family: var(--font);
      color: var(--g-900);
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      max-width: 390px;
      margin: 0 auto;
      display: flex; flex-direction: column;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky; top: 0; z-index: 50;
      background: var(--white); border-bottom: 1px solid var(--g-200);
      height: 56px; padding: 0 var(--sp-16);
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-back {
      display: flex; align-items: center; gap: var(--sp-8);
      text-decoration: none; color: var(--g-600);
      font-size: 13px; font-weight: 600;
      padding: var(--sp-8); border-radius: var(--r-8);
      transition: color 0.15s;
    }
    .nav-back:hover { color: var(--g-900); }
    .nav-back svg { width: 16px; height: 16px; stroke: currentColor; }

    .nav-center {
      position: absolute; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: var(--sp-8);
    }
    .nav-logo {
      width: 28px; height: 28px; background:var(--cj-morado);
      border-radius: var(--r-8);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: var(--white);
    }
    .nav-title { font-size: 14px; font-weight: 700; }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: var(--sp-16) var(--sp-16) var(--sp-48);
      display: flex; flex-direction: column; gap: var(--sp-12);
    }

    /* ── Banner: cotización guardada ── */
    .banner-contexto {
      background: var(--g-800);
      border-radius: var(--r-12);
      padding: var(--sp-12) var(--sp-16);
      display: flex; align-items: center; gap: var(--sp-12);
    }
    .banner-icon {
      width: 36px; height: 36px; background: var(--g-600);
      border-radius: var(--r-8);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .banner-icon svg { width: 18px; height: 18px; stroke: var(--white); }
    .banner-title { font-size: 13px; font-weight: 700; color: var(--white); line-height: 1.2; }
    .banner-sub   { font-size: 11px; color: var(--g-300); margin-top: var(--sp-4); font-weight: 500; }

    /* ── CARD ── */
    .form-card {
      background: var(--white);
      border: 1px solid var(--g-200);
      border-radius: var(--r-16);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }

    .form-header {
      background: var(--g-800);
      padding: var(--sp-24) var(--sp-16) var(--sp-16);
      text-align: center;
    }
    .form-header-icon {
      width: 44px; height: 44px; background: var(--g-600);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto var(--sp-12);
    }
    .form-header-icon svg { width: 20px; height: 20px; stroke: var(--white); }
    .form-title { font-size: 18px; font-weight: 800; color: var(--white); }
    .form-sub   { font-size: 12px; color: var(--g-300); margin-top: var(--sp-4); }

    /* ── Banner de error global ── */
    /* Aparece cuando las credenciales son inválidas */
    .error-global {
      display: none;
      margin: var(--sp-16) var(--sp-16) 0;
      background: var(--g-100);
      border: 1.5px solid var(--g-400);
      border-radius: var(--r-8);
      padding: var(--sp-12) var(--sp-16);
      display: flex; align-items: flex-start; gap: var(--sp-8);
    }
    .error-global.is-visible { display: flex; }
    .error-global svg { width: 16px; height: 16px; stroke: var(--g-600); flex-shrink: 0; margin-top: 1px; }
    .error-global-txt {
      font-size: 13px; font-weight: 600; color: var(--g-700); line-height: 1.5;
    }
    .error-global-txt span {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--g-500); margin-top: var(--sp-4);
    }

    /* ── Formulario ── */
    .form-body {
      padding: var(--sp-24) var(--sp-16);
      display: flex; flex-direction: column; gap: var(--sp-16);
    }

    .field { display: flex; flex-direction: column; gap: var(--sp-8); }

    .field-label {
      font-size: 12px; font-weight: 700; color: var(--g-700);
      display: flex; align-items: center; justify-content: space-between;
    }

    .field-input-wrap {
      position: relative; border: 1.5px solid var(--g-200);
      border-radius: var(--r-8); background: var(--white);
      transition: border-color 0.15s, box-shadow 0.15s;
      display: flex; align-items: center;
    }
    .field-input-wrap:focus-within {
      border-color: var(--g-600);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }
    .field-input-wrap.has-error {
      border-color: var(--g-500); background: var(--g-50);
    }

    .field-icon { padding: 0 var(--sp-12); display: flex; align-items: center; flex-shrink: 0; }
    .field-icon svg { width: 16px; height: 16px; stroke: var(--g-400); }

    .field-input {
      flex: 1;
      padding: var(--sp-12) var(--sp-12) var(--sp-12) 0;
      border: none; outline: none; background: transparent;
      font-family: var(--font); font-size: 15px; font-weight: 500;
      color: var(--g-900); caret-color: var(--g-600);
    }
    .field-input::placeholder { color: var(--g-300); font-weight: 400; }

    .field-action {
      padding: 0 var(--sp-12);
      font-size: 12px; font-weight: 700;
      color: var(--g-500); cursor: pointer; user-select: none; flex-shrink: 0;
    }
    .field-action:hover { color: var(--g-700); }

    /* Link olvidé contraseña */
    .forgot-link {
      font-size: 12px; font-weight: 600;
      color: var(--g-500); text-decoration: none;
    }
    .forgot-link:hover { color: var(--g-800); text-decoration: underline; }

    /* ── Submit ── */
    .form-footer {
      padding: 0 var(--sp-16) var(--sp-24);
      display: flex; flex-direction: column; gap: var(--sp-12);
    }

    .btn-submit {
      width: 100%; background: var(--g-900); color: var(--white);
      border: none; border-radius: var(--r-12); padding: var(--sp-16);
      font-family: var(--font); font-size: 15px; font-weight: 700;
      cursor: pointer; text-align: center;
      transition: background 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: var(--sp-8);
    }
    .btn-submit:hover { background: var(--g-700); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { background: var(--g-300); cursor: not-allowed; }

    .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: var(--white); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-submit.is-loading .spinner { display: block; }
    .btn-submit.is-loading .btn-txt { opacity: 0.7; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divisor OR */
    .or-divider {
      display: flex; align-items: center; gap: var(--sp-12);
      font-size: 11px; font-weight: 600; color: var(--g-400);
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--g-200);
    }

    /* Link a registro */
    .link-registro {
      text-align: center;
      font-size: 13px; color: var(--g-500); font-weight: 500;
    }
    .link-registro a {
      color: var(--g-800); font-weight: 700; text-decoration: none;
    }
    .link-registro a:hover { text-decoration: underline; }

    /* ── Wf annotations ── */
    .wf-note {
      display: inline-block; background: var(--g-200);
      border: 1px dashed var(--g-400); border-radius: var(--r-4);
      padding: 1px var(--sp-4); font-size: 8px; font-weight: 700;
      color: var(--g-600); font-family: monospace;
      vertical-align: middle; margin-left: var(--sp-4); cursor: help;
    }
  
    /* ── Sobrescrituras de marca Cambio J ─────────────────────────────────── */
    .topbar,
    .nav-logo,
    .header-dark { background: var(--cj-morado) !important; }

    /* Botones primarios */
    .btn-primary,
    button[class*="btn"]:not(.btn-ghost):not(.btn-outline),
    a.btn:not(.btn-ghost) {
      background: var(--cj-morado);
      color: var(--white);
    }
    .btn-primary:hover { background: var(--cj-morado-medio); }

    /* Fondo de secciones de marca */
    .section-brand { background: var(--cj-morado-claro); }

    /* Highlight numérico (montos, KPIs) */
    .kpi-val.highlight,
    .tx-monto.positive { color: var(--cj-turquesa) !important; }

    /* Alert badge */
    .acceso-badge.alert-badge { background: var(--cj-rosa) !important; }

    /* Alerta icon */
    .alerta-icon { background: rgba(236,72,153,0.15) !important; }
    .alerta-icon svg { stroke: var(--cj-rosa) !important; }

    /* Topbar: ajustar colores de texto secundario */
    .topbar-role,
    .topbar-date { color: var(--cj-morado-claro); }

    .topbar-avatar {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }

    /* Bottom-nav active */
    .nav-item.active .nav-icon svg { stroke: var(--cj-morado); }
    .nav-item.active .nav-label { color: var(--cj-morado); }

    /* Tabs activos */
    .tab.active {
      color: var(--cj-morado);
      border-bottom-color: var(--cj-morado);
    }

    /* Status chips */
    .chip-pending  { background: #FEF3C7; color: #92400E; }
    .chip-approved { background: #D1FAE5; color: #065F46; }
    .chip-rejected { background: #FEE2E2; color: #991B1B; }
    .chip-paid     { background: var(--cj-morado-claro); color: var(--cj-morado); }

    /* Inputs focus */
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--cj-morado) !important;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12) !important;
    }

    /* Links */
    a.link-primary { color: var(--cj-morado); }

    /* KPI cards con acento */
    .kpi-block { border-left: 3px solid var(--cj-turquesa); }

    /* Scroll indicator / progress bar */
    .progress-bar { background: var(--cj-morado); }
    /* ──────────────────────────────────────────────────────────────────────── */
</style>
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar" role="navigation" aria-label="Navegación">
    <a href="../00_simulador/02_resultado-cotizacion.html" class="nav-back" aria-label="Volver al resultado">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Volver
    </a>
    <div class="nav-center">
      <div class="nav-logo" aria-hidden="true">CJ</div>
      <span class="nav-title">Ingresar</span>
    </div>
    <!-- Sin step indicator: el login no es paso secuencial obligatorio -->
    <div style="width:56px"></div>
  </nav>

  <!-- ── MAIN ── -->
  <main role="main" aria-label="Formulario de inicio de sesión">

    <!-- Banner: cotización guardada -->
    <div class="banner-contexto" id="banner-contexto" role="note" aria-label="Cotización guardada">
      <div class="banner-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div>
        <div class="banner-title">Cotización guardada</div>
        <div class="banner-sub" id="banner-detalle">
          S/ 500.00 → Bs. 7,100.00 · Inicia sesión para continuar tu envío
        </div>
      </div>
    </div>

    <!-- Card de login -->
    <div class="form-card">

      <header class="form-header">
        <div class="form-header-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
        </div>
        <h1 class="form-title">Bienvenido de vuelta</h1>
        <p class="form-sub">Ingresa a tu cuenta para continuar</p>
      </header>

      <!-- Error global: credenciales inválidas -->
      <!-- No se especifica cuál campo falló (seguridad) -->
      <div class="error-global" id="error-global" role="alert" aria-live="polite">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4M12 16h.01"/>
        </svg>
        <div class="error-global-txt">
          Correo o contraseña incorrectos.
          <span>
            Verifica tus datos e inténtalo de nuevo.
            <span class="wf-note" title="No se indica qué campo falló por seguridad — evita enumeración de usuarios">sec</span>
          </span>
        </div>
      </div>

      <form class="form-body" id="form-login" novalidate aria-label="Datos de acceso">

        <!-- Email -->
        <div class="field">
          <label class="field-label" for="input-email">
            Correo electrónico
          </label>
          <div class="field-input-wrap" id="wrap-email">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input
              class="field-input" id="input-email" name="email"
              type="email" placeholder="juan@ejemplo.com"
              autocomplete="email" inputmode="email"
              oninput="resetError()"
              aria-required="true"
            >
          </div>
        </div>

        <!-- Contraseña -->
        <div class="field">
          <label class="field-label" for="input-password">
            Contraseña
            <a href="#" class="forgot-link"
              aria-label="¿Olvidaste tu contraseña?">
              ¿La olvidaste?
            </a>
          </label>
          <div class="field-input-wrap" id="wrap-password">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              class="field-input" id="input-password" name="password"
              type="password" placeholder="Tu contraseña"
              autocomplete="current-password"
              oninput="resetError()"
              aria-required="true"
            >
            <span class="field-action" onclick="togglePassword(this)"
              role="button" tabindex="0" aria-label="Mostrar contraseña">
              Ver
            </span>
          </div>
        </div>

      </form>

      <div class="form-footer">

        <button class="btn-submit" id="btn-submit"
          onclick="submitLogin()" type="button"
          aria-label="Iniciar sesión">
          <div class="spinner" aria-hidden="true"></div>
          <span class="btn-txt">Ingresar →</span>
        </button>

        <div class="or-divider" aria-hidden="true">o</div>

        <p class="link-registro">
          ¿No tienes cuenta?
          <a href="01_registro.html">Regístrate gratis</a>
        </p>

      </div>

    </div><!-- /form-card -->

  </main>

  <script>
    /* ============================================================
       Lógica del formulario de login
       ============================================================ */

    // ── Banner cotización ─────────────────────────────────────
    function cargarBanner() {
      const raw = sessionStorage.getItem('pendingTransaction');
      if (!raw) {
        document.getElementById('banner-contexto').style.display = 'none';
        return;
      }
      const data = JSON.parse(raw);
      const fmt = n => new Intl.NumberFormat('es-PE',{
        minimumFractionDigits:2, maximumFractionDigits:2
      }).format(parseFloat(n));
      document.getElementById('banner-detalle').textContent =
        `${data.from_currency || 'S/'} ${fmt(data.amount_origen)} → Bs. ${fmt(data.amount_ves)} · Inicia sesión para continuar tu envío`;
    }

    // ── Reset error global ────────────────────────────────────
    function resetError() {
      document.getElementById('error-global').classList.remove('is-visible');
      ['wrap-email','wrap-password'].forEach(id => {
        document.getElementById(id).classList.remove('has-error');
      });
    }

    // ── Toggle contraseña ─────────────────────────────────────
    function togglePassword(btn) {
      const input = document.getElementById('input-password');
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      btn.textContent = show ? 'Ocultar' : 'Ver';
    }

    // ── Submit ────────────────────────────────────────────────
    function submitLogin() {
      const email    = document.getElementById('input-email').value.trim();
      const password = document.getElementById('input-password').value;

      // Validación básica de campos vacíos
      if (!email || !password) {
        ['wrap-email','wrap-password'].forEach(id => {
          const wrap = document.getElementById(id);
          const input = wrap.querySelector('input');
          if (!input.value.trim()) wrap.classList.add('has-error');
        });
        return;
      }

      // Estado: cargando
      const btn = document.getElementById('btn-submit');
      btn.classList.add('is-loading');
      btn.disabled = true;

      // [WF] Simula respuesta del backend
      setTimeout(() => {
        btn.classList.remove('is-loading');
        btn.disabled = false;

        // Simular error de credenciales (demo)
        // En producción: verificar response status 422/401
        const credencialesOk = email.includes('@') && password.length >= 4;

        if (!credencialesOk) {
          // Estado: error de credenciales — mensaje genérico (seguridad)
          document.getElementById('error-global').classList.add('is-visible');
          document.getElementById('wrap-email').classList.add('has-error');
          document.getElementById('wrap-password').classList.add('has-error');
          return;
        }

        // Éxito → redirect según contexto
        const pending = sessionStorage.getItem('pendingTransaction');
        const dest = pending
          ? '02_envio/01_ingresar-codigo-vendedor.html'
          : 'dashboard';

        alert(`[WIREFRAME] Login simulado.\n\n→ Redirect: screens/${dest}`);
      }, 1500);
    }

    // ── Init ──────────────────────────────────────────────────
    if (!sessionStorage.getItem('pendingTransaction')) {
      sessionStorage.setItem('pendingTransaction', JSON.stringify({
        amount_origen:'500.00', amount_ves:'7100.00',
        from_currency:'PEN', pair_id:1,
        ves_rate:14.20, usd_bcv_rate:36.50, eur_bcv_rate:40.20,
        exchange_rate_id:1
      }));
    }
    cargarBanner();
  </script>

</body>
</html>

<!-- ============================================================
     UX NOTES — Login
     Rol: Cliente existente
     Módulo: screens/01_auth/02_login.html
     ============================================================

     Decisiones de diseño:
     - Error de credenciales genérico → Seguridad: no revelar si el
       email existe o no en la base de datos evita enumeración de
       usuarios (OWASP A07: Identification and Authentication Failures).
     - Ambos campos se marcan con error (no solo uno) → consistente
       con el principio anterior; el usuario no sabe cuál es el campo
       que falló.
     - "¿La olvidaste?" inline junto al label de contraseña → posición
       estándar esperada por el usuario; reduce fricción sin interrumpir
       el flujo (Hick's Law: reducir decisiones).
     - Sin indicador de paso (no es paso secuencial) → el login es una
       ruta alternativa al registro; no tiene número de paso en el flujo.
     - Banner de cotización guardada igual que en registro → coherencia
       visual y motivación para completar el login.
     - Redirect inteligente post-login → si hay pendingTransaction en
       sessionStorage, va al flujo de envío; si no, al dashboard.
     - Toggle "Ver/Ocultar" en contraseña → accesibilidad mobile.
     - Escala 8pt, paleta neutral.

     Estados cubiertos:
     - [x] Vacío — campos limpios, banner visible si hay cotización
     - [x] Campos vacíos al submit — wrap.has-error en ambos campos
     - [x] Error de credenciales — banner global genérico, ambos campos marcados
     - [x] Cargando — botón con spinner, deshabilitado
     - [x] Sin cotización — banner oculto
