<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>[WF] 05/07_transacciones — Cambio J Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --g-900:#111827;--g-800:#1F2937;--g-700:#374151;--g-600:#4B5563;
      --g-500:#6B7280;--g-400:#9CA3AF;--g-300:#D1D5DB;--g-200:#E5E7EB;
      --g-100:#F3F4F6;--g-50:#F9FAFB;--white:#FFFFFF;
      --font:'Figtree',system-ui,sans-serif;
      --r-4:4px;--r-8:8px;--r-12:12px;--r-16:16px;--r-f:999px;
      --sp-4:4px;--sp-8:8px;--sp-12:12px;--sp-16:16px;--sp-24:24px;
      --nav-h:64px;
    }
    html { background:var(--cj-fondo)}
    body{font-family:var(--font);color:var(--g-900);-webkit-font-smoothing:antialiased;min-height:100dvh;max-width:390px;margin:0 auto;display:flex;flex-direction:column}
    .topbar{background:var(--cj-morado);padding:var(--sp-16)}
    .topbar-role{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--g-500);margin-bottom:2px}
    .topbar-title{font-size:20px;font-weight:800;color:var(--white)}
    .topbar-sub{font-size:10px;color:var(--g-500);margin-top:2px}
    main{flex:1;padding:var(--sp-16) var(--sp-16) calc(var(--nav-h)+var(--sp-32));display:flex;flex-direction:column;gap:var(--sp-12)}
    .section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--g-500)}
    /* Alerta urgentes */
    .alerta{background:var(--g-900);border-radius:var(--r-12);padding:var(--sp-12) var(--sp-16);display:flex;align-items:center;gap:var(--sp-12);text-decoration:none;color:inherit;transition:opacity 0.15s}
    .alerta:hover{opacity:0.9}
    .alerta-icon{width:36px;height:36px;background:rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .alerta-icon svg{width:18px;height:18px;stroke:var(--white)}
    .alerta-info{flex:1}
    .alerta-num{font-size:22px;font-weight:800;color:var(--white);line-height:1}
    .alerta-txt{font-size:11px;color:var(--g-400);margin-top:1px}
    .alerta-cta{font-size:12px;font-weight:700;color:var(--g-300);white-space:nowrap}
    /* Filtros chip */
    .filtros-scroll{display:flex;gap:var(--sp-8);overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
    .filtros-scroll::-webkit-scrollbar{display:none}
    .filtro-chip{padding:6px 14px;border:1.5px solid var(--g-200);border-radius:var(--r-f);font-size:12px;font-weight:700;color:var(--g-500);background:var(--white);cursor:pointer;white-space:nowrap;transition:all 0.15s;font-family:var(--font)}
    .filtro-chip:hover{border-color:var(--g-400);color:var(--g-700)}
    .filtro-chip.active{border-color:var(--g-900);background:var(--g-900);color:var(--white)}
    /* Lista transacciones */
    .card{background:var(--white);border:1px solid var(--g-200);border-radius:var(--r-16);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
    .tx-row{display:flex;align-items:center;gap:var(--sp-12);padding:var(--sp-12) var(--sp-16);border-bottom:1px solid var(--g-200);cursor:pointer;text-decoration:none;color:inherit;transition:background 0.15s}
    .tx-row:last-child{border-bottom:none}
    .tx-row:hover{background:var(--g-50)}
    .tx-row.urgente{border-left:3px solid var(--g-700)}
    .tx-avatar{width:36px;height:36px;border-radius:50%;background:var(--g-100);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--g-600);flex-shrink:0}
    .tx-info{flex:1;min-width:0}
    .tx-cliente{font-size:13px;font-weight:700;color:var(--g-900)}
    .tx-meta{font-size:11px;color:var(--g-400);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-right{text-align:right;flex-shrink:0}
    .tx-monto{font-size:14px;font-weight:800;color:var(--g-900);font-variant-numeric:tabular-nums}
    .estado-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--r-f);margin-top:3px;display:inline-block}
    .estado-badge.aprobado{background:var(--g-900);color:var(--white)}
    .estado-badge.pendiente{background:var(--g-100);color:var(--g-600);border:1px solid var(--g-200)}
    .estado-badge.completado{background:var(--g-200);color:var(--g-700)}
    .estado-badge.observado{background:var(--g-100);color:var(--g-500);border:1px solid var(--g-300)}
    .estado-badge.denegado{background:var(--g-100);color:var(--g-400);border:1px solid var(--g-200)}
    /* Bottom nav */
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:var(--white);border-top:1px solid var(--g-200);height:var(--nav-h);display:flex;align-items:center;justify-content:space-around;padding:0 4px;z-index:50}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;cursor:pointer;text-decoration:none;border:none;background:none;font-family:var(--font);transition:color 0.15s;color:var(--g-400);position:relative}
    .nav-item.active{color:var(--g-900)}
    .nav-item svg{width:20px;height:20px;stroke:currentColor}
    .nav-item span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px}
    .nav-badge{position:absolute;top:4px;right:calc(50% - 16px);min-width:16px;height:16px;background:var(--g-900);border-radius:var(--r-f);font-size:9px;font-weight:800;color:var(--white);display:flex;align-items:center;justify-content:center;padding:0 4px
      /* ── Paleta de marca Cambio J ── */
      --cj-morado:        #7C3AED;
      --cj-morado-medio:  #A78BFA;
      --cj-morado-claro:  #DDD6FE;
      --cj-turquesa:      #06B6D4;
      --cj-turquesa-claro:#67E8F9;
      --cj-rosa:          #EC4899;
      --cj-fondo:         #F8FAFC;
      --cj-texto:         #1E293B;
      --cj-texto-claro:   #64748B;

      /* Semánticos de marca */
      --brand-primary:    var(--cj-morado);
      --brand-secondary:  var(--cj-turquesa);
      --brand-accent:     var(--cj-rosa);
      --brand-surface:    var(--cj-morado-claro);
}
  
    /* ── Sobrescrituras de marca Cambio J ─────────────────────────────────── */
    .topbar,
    .nav-logo,
    .header-dark { background: var(--cj-morado) !important; }

    /* Botones primarios */
    .btn-primary,
    button[class*="btn"]:not(.btn-ghost):not(.btn-outline),
    a.btn:not(.btn-ghost) {
      background: var(--cj-morado);
      color: var(--white);
    }
    .btn-primary:hover { background: var(--cj-morado-medio); }

    /* Fondo de secciones de marca */
    .section-brand { background: var(--cj-morado-claro); }

    /* Highlight numérico (montos, KPIs) */
    .kpi-val.highlight,
    .tx-monto.positive { color: var(--cj-turquesa) !important; }

    /* Alert badge */
    .acceso-badge.alert-badge { background: var(--cj-rosa) !important; }

    /* Alerta icon */
    .alerta-icon { background: rgba(236,72,153,0.15) !important; }
    .alerta-icon svg { stroke: var(--cj-rosa) !important; }

    /* Topbar: ajustar colores de texto secundario */
    .topbar-role,
    .topbar-date { color: var(--cj-morado-claro); }

    .topbar-avatar {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }

    /* Bottom-nav active */
    .nav-item.active .nav-icon svg { stroke: var(--cj-morado); }
    .nav-item.active .nav-label { color: var(--cj-morado); }

    /* Tabs activos */
    .tab.active {
      color: var(--cj-morado);
      border-bottom-color: var(--cj-morado);
    }

    /* Status chips */
    .chip-pending  { background: #FEF3C7; color: #92400E; }
    .chip-approved { background: #D1FAE5; color: #065F46; }
    .chip-rejected { background: #FEE2E2; color: #991B1B; }
    .chip-paid     { background: var(--cj-morado-claro); color: var(--cj-morado); }

    /* Inputs focus */
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--cj-morado) !important;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12) !important;
    }

    /* Links */
    a.link-primary { color: var(--cj-morado); }

    /* KPI cards con acento */
    .kpi-block { border-left: 3px solid var(--cj-turquesa); }

    /* Scroll indicator / progress bar */
    .progress-bar { background: var(--cj-morado); }
    /* ──────────────────────────────────────────────────────────────────────── */
</style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-role">Administrador · Cambio J</div>
    <div class="topbar-title">Transacciones</div>
    <div class="topbar-sub">Todos los vendedores · Todos los períodos</div>
  </header>

  <main role="main">
    <!-- Alerta urgente: aprobadas por vendedor que esperan al admin -->
    <a href="07_transacciones.html?filtro=aprobado" class="alerta" aria-label="Ver transacciones que requieren tu acción">
      <div class="alerta-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <div class="alerta-info">
        <div class="alerta-num">4</div>
        <div class="alerta-txt">Aprobadas por vendedores · Requieren tu acción</div>
      </div>
      <div class="alerta-cta">Ver →</div>
    </a>

    <!-- Filtros por estado -->
    <div>
      <div class="filtros-scroll" role="group" aria-label="Filtrar por estado">
        <button class="filtro-chip active" onclick="setFiltro('todos',this)">Todos</button>
        <button class="filtro-chip" onclick="setFiltro('aprobado',this)">Aprobadas ×vend.</button>
        <button class="filtro-chip" onclick="setFiltro('pendiente',this)">Pendientes</button>
        <button class="filtro-chip" onclick="setFiltro('completado',this)">Completadas</button>
        <button class="filtro-chip" onclick="setFiltro('observado',this)">Observadas</button>
        <button class="filtro-chip" onclick="setFiltro('denegado',this)">Denegadas</button>
      </div>
    </div>

    <!-- Lista -->
    <div class="card">
      <div id="tx-list" role="list" aria-label="Lista de transacciones"></div>
    </div>
  </main>

  <nav class="bottom-nav" role="navigation" aria-label="Navegación admin">
    <a href="01_dashboard.html" class="nav-item" aria-label="Dashboard"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
    <a href="07_transacciones.html" class="nav-item active" aria-current="page" aria-label="Transacciones"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span>Transac.</span><div class="nav-badge">4</div></a>
    <a href="02_vendedores.html" class="nav-item" aria-label="Vendedores"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Vendedores</span></a>
    <a href="11_configuracion.html" class="nav-item" aria-label="Configuración"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>Config.</span></a>
  </nav>

  <script>
    const TXS = [
      { id:'TRX-847', iniciales:'JP', cliente:'Juan Pérez',    vendedor:'M. González', monto:'S/ 500', estado:'aprobado',   tiempo:'Hace 10 min' },
      { id:'TRX-846', iniciales:'AT', cliente:'Ana Torres',    vendedor:'C. Ramírez',  monto:'S/ 300', estado:'aprobado',   tiempo:'Hace 25 min' },
      { id:'TRX-845', iniciales:'LV', cliente:'Luis Vargas',   vendedor:'A. Rodríguez',monto:'S/ 750', estado:'aprobado',   tiempo:'Hace 1h' },
      { id:'TRX-844', iniciales:'RM', cliente:'Rosa Mendez',   vendedor:'M. González', monto:'S/ 200', estado:'aprobado',   tiempo:'Hace 2h' },
      { id:'TRX-843', iniciales:'CR', cliente:'Carlos Ruiz',   vendedor:'C. Ramírez',  monto:'S/ 450', estado:'pendiente',  tiempo:'Hace 3h' },
      { id:'TRX-842', iniciales:'PM', cliente:'Pedro Morales', vendedor:'M. González', monto:'S/ 600', estado:'observado',  tiempo:'Hace 4h' },
      { id:'TRX-841', iniciales:'SS', cliente:'Sara Salinas',  vendedor:'A. Rodríguez',monto:'S/ 350', estado:'completado', tiempo:'Ayer' },
      { id:'TRX-840', iniciales:'GR', cliente:'Gloria Ríos',   vendedor:'C. Ramírez',  monto:'S/ 800', estado:'completado', tiempo:'Ayer' },
      { id:'TRX-839', iniciales:'MF', cliente:'Mario Flores',  vendedor:'M. González', monto:'S/ 250', estado:'denegado',   tiempo:'Hace 2 días' },
    ];
    const ETIQUETAS = { aprobado:'Aprobada ×vend.', pendiente:'Pendiente', completado:'Completada', observado:'Observada', denegado:'Denegada' };
    let filtroActivo = 'todos';

    function setFiltro(f, btn) {
      filtroActivo = f;
      document.querySelectorAll('.filtro-chip').forEach(c=>c.classList.remove('active'));
      btn.classList.add('active');
      renderTxs();
    }

    function renderTxs() {
      const lista = filtroActivo === 'todos' ? TXS : TXS.filter(t=>t.estado===filtroActivo);
      document.getElementById('tx-list').innerHTML = lista.map(t => `
        <a href="08_detalle-transaccion.html" class="tx-row ${t.estado==='aprobado'?'urgente':''}" role="listitem"
           aria-label="${t.cliente} · ${t.monto} · ${ETIQUETAS[t.estado]}">
          <div class="tx-avatar">${t.iniciales}</div>
          <div class="tx-info">
            <div class="tx-cliente">${t.cliente}</div>
            <div class="tx-meta">${t.vendedor} · ${t.tiempo} · ${t.id}</div>
          </div>
          <div class="tx-right">
            <div class="tx-monto">${t.monto}</div>
            <span class="estado-badge ${t.estado}">${ETIQUETAS[t.estado]}</span>
          </div>
        </a>`).join('');
    }
    renderTxs();
  </script>
</body>
</html>
